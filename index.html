<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapCal - Yapay Zeka Diyet Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0d0f12; --card-bg: #1a1d24; --accent: #ccff00; --accent-glow: rgba(204, 255, 0, 0.4); --text-main: #ffffff; --text-muted: #8892b0; --danger: #ff4d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .screen { display: none; flex: 1; padding: 20px; padding-bottom: 90px; overflow-y: auto; }
        .screen.active { display: block; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; background: var(--accent); color: #000; font-weight: 800; border: none; cursor: pointer; text-align: center; }
        .input-group { margin-bottom: 20px; }
        input, select { width: 100%; padding: 15px; border-radius: 12px; background: var(--card-bg); border: 1px solid #2d323e; color: white; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(26, 29, 36, 0.95); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #2d323e; }
        .nav-item { color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--accent); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; text-align: center; }
        .loader { border: 5px solid #2d323e; border-top: 5px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="screen-onboarding" class="screen">
        <h1>Snap<span class="text-accent">Cal</span></h1>
        <div class="input-group"><label>Cinsiyet</label><select id="reg-gender"><option value="male">Erkek</option><option value="female">Kadın</option></select></div>
        <div class="input-group"><label>Yaş</label><input type="number" id="reg-age"></div>
        <div class="input-group"><label>Boy (cm)</label><input type="number" id="reg-height"></div>
        <div class="input-group"><label>Mevcut Kilo (kg)</label><input type="number" id="reg-weight"></div>
        <div class="input-group"><label>Hedef Kilo (kg)</label><input type="number" id="reg-target"></div>
        <button class="btn" onclick="saveProfile()">Başla</button>
    </div>

    <div id="screen-home" class="screen">
        <div class="dashboard-header"><h2>Merhaba!</h2><div id="cal-info">Hedef: 0 kcal</div></div>
        <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none" onchange="processImage(event)">
        <button class="btn" onclick="document.getElementById('cameraInput').click()">Öğün Tara</button>
    </div>

    <div id="screen-history" class="screen"><h2>Geçmiş</h2><div id="history-list"></div></div>

    <div id="screen-settings" class="screen">
        <h2>Ayarlar</h2>
        <input type="password" id="set-api-key" placeholder="API Anahtarını Gir">
        <button class="btn" style="margin-top:10px;" onclick="saveApiKey()">Kaydet</button>
    </div>

    <div class="bottom-nav" id="bottom-nav" style="display:none;">
        <div class="nav-item" onclick="switchTab('home')"><span>Ana Sayfa</span></div>
        <div class="nav-item" onclick="switchTab('history')"><span>Geçmiş</span></div>
        <div class="nav-item" onclick="switchTab('settings')"><span>Ayarlar</span></div>
    </div>

    <div class="modal-overlay" id="loadingModal"><div class="modal-content"><div class="loader"></div><h3>Analiz Ediliyor...</h3></div></div>

    <script>
        const DB_PROFILE = 'snapcal_profile', DB_APIKEY = 'snapcal_apikey', DB_HISTORY = 'snapcal_history';

        function saveProfile() {
            const profile = { targetCalories: 2000 }; // Basit hesaplama
            localStorage.setItem(DB_PROFILE, JSON.stringify(profile));
            location.reload();
        }

        function saveApiKey() { localStorage.setItem(DB_APIKEY, document.getElementById('set-api-key').value); alert("Kaydedildi!"); }

        function switchTab(tabId) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(`screen-${tabId}`).style.display = 'block';
        }

        async function processImage(event) {
            const file = event.target.files[0];
            const apiKey = localStorage.getItem(DB_APIKEY);
            document.getElementById('loadingModal').style.display = 'flex';

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                const apiUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{text: "Yemeği analiz et ve sadece kalori miktarını söyle."}, { inline_data: { mime_type: file.type || "image/jpeg", data: base64Data } }] }]
                        })
                    });
                    const data = await response.json();
                    alert("Sonuç: " + data.candidates[0].content.parts[0].text);
                } catch (e) { alert("Hata: " + e.message); }
                finally { document.getElementById('loadingModal').style.display = 'none'; }
            };
        }

        // Başlangıç kontrolü
        if(localStorage.getItem(DB_PROFILE)) { switchTab('home'); document.getElementById('bottom-nav').style.display = 'flex'; }
        else { switchTab('onboarding'); }
    </script>
</body>
</html>
