<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapCal - Kişisel</title>
    <style>
        :root { --bg: #121212; --accent: #00e676; --text: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .hidden { display: none; }
        button { background: var(--accent); border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        #camera-btn { height: 150px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="profile-section">
        <h2>Hedefini Belirle</h2>
        <input type="number" id="age" placeholder="Yaş">
        <input type="number" id="weight" placeholder="Kilo (kg)">
        <input type="number" id="height" placeholder="Boy (cm)">
        <button onclick="saveProfile()">Kaydet</button>
    </div>

    <div id="main-section" class="hidden">
        <h2 id="daily-limit">Günlük Limit: -</h2>
        <button id="camera-btn" onclick="openCamera()">📸 Öğününü Tara</button>
        <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden" onchange="processImage(event)">
        <div id="result"></div>
    </div>

    <div id="settings-section">
        <input type="text" id="api-key" placeholder="Gemini API Anahtarı">
        <button onclick="saveApi()">API Kaydet</button>
    </div>

<script>
    // Profil Kaydı
    function saveProfile() {
        localStorage.setItem('profile', JSON.stringify({ age: document.getElementById('age').value }));
        document.getElementById('profile-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
    }

    function saveApi() {
        localStorage.setItem('geminiApiKey', document.getElementById('api-key').value);
        alert('API Anahtarı kaydedildi!');
    }

    // Kamera
    function openCamera() {
        if (!localStorage.getItem('geminiApiKey')) return alert('Önce API anahtarını gir!');
        document.getElementById('file-input').click();
    }

    // Gemini API Çağrısı (Hata Giderilmiş Versiyon)
    async function processImage(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const apiKey = localStorage.getItem('geminiApiKey');
            
            // v1 Endpoint'i kullanıldı
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Bu yemeğin kalori ve besin değerlerini kısa özetle." }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }]
                })
            });

            const data = await response.json();
            if (data.candidates) {
                document.getElementById('result').innerText = data.candidates[0].content.parts[0].text;
            } else {
                alert("Hata: " + JSON.stringify(data.error));
            }
        };
        reader.readAsDataURL(file);
    }

    // Başlangıç Kontrolü
    if (localStorage.getItem('profile')) {
        document.getElementById('profile-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
    }
</script>
</body>
</html>
